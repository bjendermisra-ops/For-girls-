<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Health Tools | स्वास्थ्य उपकरण</title>
    <meta name="description" content="A complete directory of female health, pregnancy, and wellness tools.">
    <meta name="theme-color" content="#FF5A7A">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* Shared Premium Variables from Home Page */
        :root {
            --bg-color: #FEF1F6;
            --primary-color: #FF5A7A;
            --primary-grad: linear-gradient(135deg, #FF5A7A, #FF7696);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #2B2B32;
            --text-muted: #8E8D93;
            --shadow-soft: 0 15px 40px rgba(255, 90, 122, 0.08);
            --shadow-hover: 0 20px 50px rgba(255, 90, 122, 0.15);
            --modal-bg: rgba(0,0,0,0.5);
            --border-radius-lg: 35px;
        }

        /* NEW THEMES SYNCED WITH APP */
        body.theme-lavender {
            --bg-color: #F4F1FE;
            --primary-color: #9D7AFF;
            --primary-grad: linear-gradient(135deg, #9D7AFF, #BCA1FF);
            --shadow-soft: 0 15px 40px rgba(157, 122, 255, 0.15);
            --shadow-hover: 0 20px 50px rgba(157, 122, 255, 0.25);
        }
        body.theme-mint {
            --bg-color: #F0FEF6;
            --primary-color: #4ADE80;
            --primary-grad: linear-gradient(135deg, #4ADE80, #86EFAC);
            --shadow-soft: 0 15px 40px rgba(74, 222, 128, 0.15);
            --shadow-hover: 0 20px 50px rgba(74, 222, 128, 0.25);
        }
        body.theme-peach {
            --bg-color: #FEF4F1;
            --primary-color: #FF8A65;
            --primary-grad: linear-gradient(135deg, #FF8A65, #FFAB91);
            --shadow-soft: 0 15px 40px rgba(255, 138, 101, 0.15);
            --shadow-hover: 0 20px 50px rgba(255, 138, 101, 0.25);
        }

        body.preg-mode {
            --bg-color: #F1F8FE;
            --primary-color: #5AA1FF;
            --primary-grad: linear-gradient(135deg, #5AA1FF, #76CEFF);
            --shadow-soft: 0 15px 40px rgba(90, 161, 255, 0.1);
            --shadow-hover: 0 20px 50px rgba(90, 161, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: var(--bg-color) !important;
            color: var(--text-dark);
            padding-bottom: calc(120px + env(safe-area-inset-bottom));
            overflow-x: hidden;
            transition: background 0.5s ease;
            margin: 0;
        }

        /* Canvas Background */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Decorative Background Blobs Synced */
        .bg-blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.5; z-index: -1; pointer-events: none;}
        .blob-1 { width: 200px; height: 200px; background: var(--primary-color); top: -50px; left: -50px; animation: float-blob 8s infinite alternate ease-in-out, pulse-blob 6s infinite alternate; }
        .blob-2 { width: 250px; height: 250px; background: #FFD1E3; bottom: 100px; right: -50px; animation: float-blob 10s infinite alternate-reverse ease-in-out, pulse-blob 7s infinite alternate; animation-delay: -3s; }
        
        @keyframes float-blob {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            100% { transform: translateY(40px) scale(1.15) rotate(15deg); }
        }
        @keyframes pulse-blob {
            0% { opacity: 0.4; filter: blur(60px); }
            100% { opacity: 0.7; filter: blur(40px); }
        }

        /* Top Header Glassmorphism */
        .top-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: calc(15px + env(safe-area-inset-top)) 20px 20px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.6);
            animation: slideDownFade 0.8s cubic-bezier(0.1, 1, 0.3, 1) both;
        }

        @keyframes slideDownFade {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: -0.5px;
            margin: 0;
        }

        .lang-toggle {
            background: var(--card-bg);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .lang-toggle:hover, .lang-toggle:active {
            background: var(--primary-color);
            color: #fff;
            transform: scale(0.95);
        }

        /* Search Bar Setup */
        .search-container { position: relative; }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border-radius: 25px;
            border: 1.5px solid #EAEAEA;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow-soft);
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.3s ease;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 20px rgba(255, 90, 122, 0.15);
            transform: translateY(-2px);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 18px;
        }

        /* Category Header */
        .category-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
            margin: 30px 0 15px 0;
            padding-left: 15px;
            position: relative;
            animation: slideUpFade 0.6s both;
        }
        
        .category-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 5px;
            background: var(--primary-grad);
            border-radius: 10px;
        }

        /* Tool Card - Matching index.html card style */
        .tool-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 22px 18px;
            height: 100%;
            box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            animation: slideUpFade 0.6s cubic-bezier(0.1, 1, 0.3, 1) both;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-color);
        }

        .tool-icon-wrapper {
            width: 55px;
            height: 55px;
            background: var(--bg-color);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--primary-color);
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .tool-card:hover .tool-icon-wrapper {
            background: var(--primary-grad);
            color: white;
            transform: scale(1.1) rotate(5deg);
        }

        .info-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            color: var(--text-muted);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 0;
            opacity: 0.6;
        }

        .info-btn:hover {
            color: var(--primary-color);
            opacity: 1;
            transform: scale(1.1);
        }

        .tool-name {
            font-size: 17px;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.2;
            color: var(--text-dark);
            letter-spacing: -0.3px;
        }

        .tool-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            flex-grow: 1;
            line-height: 1.4;
            font-weight: 600;
        }

        /* Themed Open Button */
        .open-btn {
            background: var(--primary-grad);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 14px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(255, 90, 122, 0.3);
            display: inline-block;
        }

        .open-btn:hover { color: white; transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 90, 122, 0.4); }
        .open-btn:active { transform: scale(0.94) translateY(2px); box-shadow: 0 4px 10px rgba(255, 90, 122, 0.2); }
        body.preg-mode .open-btn {box-shadow: 0 8px 25px rgba(90, 161, 255, 0.35);}

        /* Magic Particles / Sparkles CSS */
        .magic-particle {
            position: fixed;
            pointer-events: none;
            z-index: 999999;
            animation: particle-fly 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            font-size: 20px;
        }

        @keyframes particle-fly {
            0% { opacity: 1; transform: translate(0, 0) scale(0.5); }
            50% { opacity: 1; transform: translate(var(--dx), var(--dy)) scale(1.2); }
            100% { opacity: 0; transform: translate(calc(var(--dx) * 1.5), calc(var(--dy) * 1.5)) scale(0.8); }
        }

        /* Modal Customization Synced with app */
        .modal-backdrop {
            background-color: var(--modal-bg) !important;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            border-radius: 40px 40px 0 0;
            border: none;
            background: #fff;
            transform: translateY(100%);
            animation: modalSlideUp 0.4s cubic-bezier(0.1, 1, 0.3, 1) forwards;
        }
        .modal-dialog {
            margin: auto 0 0 0;
            display: flex;
            align-items: flex-end;
            min-height: 100%;
        }
        @keyframes modalSlideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header { border-bottom: none; padding: 30px 25px 10px 25px; }
        .modal-title { font-weight: 900; color: var(--text-dark); display: flex; align-items: center; gap: 10px; font-size: 22px;}
        .modal-body { padding: 10px 25px 35px 25px; }
        
        .info-section {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .info-section h6 { color: var(--primary-color); font-weight: 800; font-size: 15px; margin-bottom: 6px; }
        .info-section p { font-size: 14px; font-weight: 600; color: var(--text-muted); margin: 0; }
        
        .important-note { background: #FFF5F7; border-left: 4px solid #FF426A; border-radius: 10px 20px 20px 10px;}
        .important-note h6 { color: #FF426A; }

        /* 🔥 PREMIUM NAVBAR BASE FROM HOME PAGE 🔥 */
        .navbar-base { 
            position:fixed; 
            bottom: calc(20px + env(safe-area-inset-bottom)); 
            left: 20px; right: 20px; height: 75px; 
            display:flex; justify-content:space-around; align-items:center; 
            background:rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            z-index:9999; border-radius: 40px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            border: 1px solid rgba(255,255,255,0.8);
        }
        .nav-link { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-decoration: none; width: 60px; height: 100%; cursor: pointer; color: #B0AFB5; position: relative;
        }
        .nav-link.active { color: var(--primary-color); }
        .nav-link .icon { width:26px; height:26px; margin-bottom: 2px; position: relative;}
        .nav-link .icon svg { stroke: currentColor; fill:none; stroke-width: 2.2; stroke-linecap: round; width:100%; height:100%; transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .nav-link.active .icon svg { transform: translateY(-4px) scale(1.15); filter: drop-shadow(0 4px 6px rgba(255, 90, 122, 0.3));}
        
        .nav-link.active::after { 
            content: ''; position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); 
            width: 6px; height: 6px; background: var(--primary-color); border-radius: 50%; 
            box-shadow: 0 2px 5px rgba(255, 90, 122, 0.5); animation: fade 0.3s; 
        }

        .nav-link.center-btn { 
            transform: translateY(-20px); background: var(--primary-grad); 
            width: 65px; height: 65px; border-radius: 50%; 
            box-shadow: 0 10px 25px rgba(255, 90, 122, 0.4); border: 4px solid var(--bg-color); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-link.center-btn:hover { transform: translateY(-23px) scale(1.05); }
        .nav-link.center-btn:active { transform: translateY(-18px) scale(0.95); }
        .nav-link.center-btn .icon { margin:0; width: 28px; height: 28px;}
        .nav-link.center-btn .icon svg { stroke: #fff;}
        .nav-link.center-btn::after { display: none; }
        body.preg-mode .nav-link.center-btn { background: linear-gradient(135deg, #5AA1FF, #76CEFF); box-shadow: 0 10px 25px rgba(90, 161, 255, 0.4); border-color: #F1F8FE;}

        @keyframes fade {from {opacity:0} to {opacity:1}}

        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; display: none; animation: slideUpFade 0.5s;}
        .empty-state i { font-size: 50px; color: var(--text-muted); margin-bottom: 20px; opacity: 0.5;}
        .empty-state h5 { font-weight: 800; color: var(--text-dark); font-size: 22px;}
        .empty-state p { font-weight: 600; color: var(--text-muted); font-size: 15px;}

    </style>
</head>
<body>

    <!-- Background Elements Synced -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <canvas id="bgCanvas"></canvas>

    <!-- Top Header -->
    <header class="top-header">
        <div class="header-top-row">
            <h1 class="page-title" id="ui-title">Health Tools</h1>
            <button class="lang-toggle" id="langToggleBtn" onclick="toggleLanguage(event)">English | हिंदी</button>
        </div>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search tools..." autocomplete="off">
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="container mb-4" id="toolsContainer" style="margin-top: 10px;">
        <!-- Content will be injected by JavaScript -->
    </main>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
        <i class="fas fa-search-minus"></i>
        <h5 id="ui-no-results">No tools found</h5>
        <p id="ui-try-again">Try searching with different keywords.</p>
    </div>

    <!-- Info Modal -->
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">
                        <i id="modalIcon" class="fas fa-info-circle text-primary"></i> 
                        <span id="modalName">Tool Name</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="background-color: var(--bg-color); border-radius: 50%; padding: 12px;"></button>
                </div>
                <div class="modal-body">
                    <p id="modalDesc" class="text-muted fw-bold mb-4" style="color: var(--text-dark) !important;">Description goes here.</p>
                    
                    <div class="info-section">
                        <h6 id="ui-how-to-use">How to use</h6>
                        <p id="modalHow">Instruction</p>
                    </div>
                    
                    <div class="info-section">
                        <h6 id="ui-when-to-use">When to use</h6>
                        <p id="modalWhen">Timing</p>
                    </div>

                    <div class="info-section">
                        <h6 id="ui-who-should-use">Who should use</h6>
                        <p id="modalWho">Target audience</p>
                    </div>

                    <div class="info-section important-note">
                        <h6 id="ui-important-note">Important Note</h6>
                        <p id="modalNote">Medical disclaimer</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🌟 SYNCED BOTTOM NAVBAR 🌟 -->
    <div class="navbar-base">
        <a onclick="location.href='index.html'" class="nav-link"><div class="icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div></a>
        <a onclick="location.href='calendar.html'" class="nav-link"><div class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div></a>
        <a onclick="location.href='symptoms.html'" class="nav-link center-btn"><div class="icon"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div></a>
        <a onclick="location.href='tools.html'" class="nav-link active"><div class="icon"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg></div></a>
        <a onclick="location.href='settings.html'" class="nav-link"><div class="icon"><svg viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line></svg></div></a>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application Logic -->
    <script>
        // Global Theme & Language State Sync with Home Page
        let configMem = JSON.parse(localStorage.getItem('appConfig')) || { lang: 'hi', pregMode: false, theme: 'default' };
        let currentLang = configMem.lang || 'en';

        // Apply Global Theme
        function applyGlobalTheme() {
            document.body.className = '';
            if(configMem.theme && configMem.theme !== 'default') {
                document.body.classList.add('theme-' + configMem.theme);
            }
            if(configMem.pregMode) {
                document.body.classList.add('preg-mode');
            }
        }

        // Particle System for Cuteness ✨
        function createParticles(x, y) {
            const numParticles = 8;
            for(let i=0; i<numParticles; i++) {
                let p = document.createElement('div');
                p.className = 'magic-particle';
                p.innerText = Math.random() > 0.5 ? '💖' : '✨';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.setProperty('--dx', (Math.random() * 100 - 50) + 'px');
                p.style.setProperty('--dy', (Math.random() * -100 - 20) + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1200);
            }
        }

        // UI Dictionary
        const uiDict = {
            en: {
                title: "Health Tools",
                search: "Search tools...",
                noResults: "No tools found",
                tryAgain: "Try searching with different keywords.",
                btnOpen: "Open",
                howToUse: "How to use",
                whenToUse: "When to use",
                whoShouldUse: "Who should use",
                importantNote: "Important Note",
                cat_period: "Period Tools",
                cat_pregnancy: "Pregnancy Tools",
                cat_health: "Health Tools",
                cat_mental: "Mental Health Tools",
                cat_lifestyle: "Lifestyle Tools",
                cat_safety: "Safety Tools",
                cat_emergency: "Emergency Tools",
                cat_ai: "AI Tools"
            },
            hi: {
                title: "स्वास्थ्य उपकरण",
                search: "उपकरण खोजें...",
                noResults: "कोई उपकरण नहीं मिला",
                tryAgain: "अन्य शब्दों के साथ खोजने का प्रयास करें।",
                btnOpen: "खोलें",
                howToUse: "कैसे उपयोग करें",
                whenToUse: "कब उपयोग करें",
                whoShouldUse: "किसे उपयोग करना चाहिए",
                importantNote: "महत्वपूर्ण नोट",
                cat_period: "मासिक धर्म उपकरण",
                cat_pregnancy: "गर्भावस्था उपकरण",
                cat_health: "स्वास्थ्य उपकरण",
                cat_mental: "मानसिक स्वास्थ्य उपकरण",
                cat_lifestyle: "जीवनशैली उपकरण",
                cat_safety: "सुरक्षा उपकरण",
                cat_emergency: "आपातकालीन उपकरण",
                cat_ai: "AI उपकरण"
            }
        };

        // Tools Data Array (All 51 Tools Preserved exactly as requested)

        // Canvas Animation System preserved exactly
        function initCanvas() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles =[];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.r = Math.random() * 4 + 1;
                    this.dx = (Math.random() - 0.5) * 0.5;
                    this.dy = (Math.random() - 0.5) * 0.5;
                    this.opacity = Math.random() * 0.5 + 0.1;
                }
                update() {
                    this.x += this.dx;
                    this.y += this.dy;
                    if (this.x < 0 || this.x > width) this.dx *= -1;
                    if (this.y < 0 || this.y > height) this.dy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 90, 122, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 40; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Render UI Elements based on Language Sync
        function updateStaticUI() {
            const dict = uiDict[currentLang];
            document.title = dict.title;
            document.getElementById('ui-title').innerText = dict.title;
            document.getElementById('searchInput').placeholder = dict.search;
            document.getElementById('ui-no-results').innerText = dict.noResults;
            document.getElementById('ui-try-again').innerText = dict.tryAgain;
            
            // Modal Labels
            document.getElementById('ui-how-to-use').innerText = dict.howToUse;
            document.getElementById('ui-when-to-use').innerText = dict.whenToUse;
            document.getElementById('ui-who-should-use').innerText = dict.whoShouldUse;
            document.getElementById('ui-important-note').innerText = dict.importantNote;
        }

        // Render Tool Cards 
        function renderTools(searchQuery = '') {
            const container = document.getElementById('toolsContainer');
            container.innerHTML = '';
            
            const categories =['period', 'pregnancy', 'health', 'mental', 'lifestyle', 'safety', 'emergency', 'ai'];
            let totalMatches = 0;
            const query = searchQuery.toLowerCase().trim();

            categories.forEach(cat => {
                const catTools = toolsData.filter(t => t.cat === cat);
                let matchedTools = catTools;

                if (query) {
                    matchedTools = catTools.filter(t => {
                        return t[currentLang].name.toLowerCase().includes(query) || 
                               t[currentLang].desc.toLowerCase().includes(query);
                    });
                }

                if (matchedTools.length > 0) {
                    totalMatches += matchedTools.length;
                    
                    // Category Title
                    const catTitle = document.createElement('h3');
                    catTitle.className = 'category-title';
                    catTitle.innerText = uiDict[currentLang]['cat_' + cat];
                    container.appendChild(catTitle);

                    // Grid Row
                    const row = document.createElement('div');
                    row.className = 'row g-3';

                    matchedTools.forEach(tool => {
                        const col = document.createElement('div');
                        col.className = 'col-6 col-md-4 col-lg-3';
                        
                        col.innerHTML = `
                            <div class="tool-card">
                                <button class="info-btn" onclick="openInfoModal('${tool.id}')" aria-label="Info">
                                    <i class="fas fa-info-circle"></i>
                                </button>
                                <div class="tool-icon-wrapper">
                                    <i class="${tool.icon}"></i>
                                </div>
                                <h4 class="tool-name">${tool[currentLang].name}</h4>
                                <p class="tool-desc">${tool[currentLang].desc}</p>
                                <a href="${tool.url}" class="open-btn" onclick="openToolEffect(event)">${uiDict[currentLang].btnOpen}</a>
                            </div>
                        `;
                        row.appendChild(col);
                    });
                    container.appendChild(row);
                }
            });

            // Handle Empty State
            const emptyState = document.getElementById('emptyState');
            if (totalMatches === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
            }
        }

        // Cute Particle Effect on Button Click
        function openToolEffect(e) {
            createParticles(e.clientX, e.clientY);
        }

        // Search Listener
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderTools(e.target.value);
        });

        // Language Toggle (Globally Synced)
        function toggleLanguage(e) {
            if(e) createParticles(e.clientX, e.clientY);
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            
            // Save to LocalStorage so Home Page also updates
            configMem.lang = currentLang;
            localStorage.setItem('appConfig', JSON.stringify(configMem));
            
            updateStaticUI();
            renderTools(document.getElementById('searchInput').value);
        }

        // Open Info Modal
        function openInfoModal(toolId) {
            const tool = toolsData.find(t => t.id === toolId);
            if(tool) {
                document.getElementById('modalIcon').className = tool.icon;
                document.getElementById('modalName').innerText = tool[currentLang].name;
                document.getElementById('modalDesc').innerText = tool[currentLang].desc;
                document.getElementById('modalHow').innerText = tool[currentLang].how;
                document.getElementById('modalWhen').innerText = tool[currentLang].when;
                document.getElementById('modalWho').innerText = tool[currentLang].who;
                document.getElementById('modalNote').innerText = tool[currentLang].note;

                const infoModal = new bootstrap.Modal(document.getElementById('infoModal'));
                infoModal.show();
            }
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            applyGlobalTheme();
            initCanvas();
            updateStaticUI();
            renderTools();
        });

    </script>
