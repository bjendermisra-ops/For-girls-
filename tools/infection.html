<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infection Symptoms Checker</title>
    <style>
        :root{--p:#FF8A65;--bg:#FEF4F1;--c:#fff;--t:#5C3A21}
        body{background:var(--bg);font-family:'Nunito',sans-serif;margin:0;padding:20px 20px 100px;color:var(--t)}
        .blob{position:fixed;border-radius:50%;filter:blur(60px);z-index:-1;opacity:.5}
        .b1{width:200px;height:200px;background:var(--p);top:-50px;left:-50px;animation:f 8s infinite alternate}
        .b2{width:250px;height:250px;background:#FFAB91;bottom:100px;right:-50px;animation:f 10s infinite alternate-reverse}
        @keyframes f{to{transform:translateY(30px) scale(1.1)}}
        .nav{display:flex;align-items:center;gap:15px;margin-bottom:20px}
        .back{background:#fff;width:40px;height:40px;border-radius:50%;display:flex;justify-content:center;align-items:center;color:var(--p);text-decoration:none;font-size:24px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
        .card{background:var(--c);border-radius:25px;padding:25px;box-shadow:0 10px 25px rgba(255,138,101,.15);animation:slideUp .5s}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .chk-box{display:flex;align-items:center;gap:10px;background:#F8F9FA;padding:15px;border-radius:15px;margin-bottom:10px;font-weight:bold;color:#555;font-size:14px}
        input[type="checkbox"]{width:20px;height:20px;accent-color:var(--p)}
        .btn{width:100%;background:linear-gradient(135deg,var(--p),#FFAB91);color:#fff;border:none;padding:18px;border-radius:15px;font-size:16px;font-weight:bold;margin-top:10px;cursor:pointer;box-shadow:0 5px 15px rgba(255,138,101,.3)}
        .res{display:none;background:#FEF4F1;border:2px dashed var(--p);padding:20px;border-radius:20px;margin-top:20px;text-align:center;font-weight:bold;animation:pop .4s}
        .mascot{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;align-items:flex-end;z-index:100}
        .m-doll{font-size:45px;background:radial-gradient(circle,rgba(255,255,255,.8),transparent);border-radius:50%;width:60px;height:60px;display:flex;justify-content:center;align-items:center;animation:f 3s infinite alternate}
        .m-msg{background:#fff;padding:10px 15px;border-radius:15px 15px 0 15px;font-size:13px;font-weight:bold;color:var(--p);box-shadow:0 5px 15px rgba(0,0,0,.1);margin-bottom:5px;display:none;animation:pop .3s}
        @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    </style>
</head>
<body>
    <div class="blob b1"></div><div class="blob b2"></div>
    <div class="mascot">
        <div class="m-msg" id="m-msg"></div>
        <div class="m-doll" onclick="showM('शर्म मत करो, डॉक्टर से बात करना नॉर्मल है! 🩺')">🧚‍♀️</div>
    </div>
    
    <div class="nav">
        <a href="../tools.html" class="back">‹</a>
        <h2 style="margin:0">Infection Check</h2>
    </div>

    <div class="card">
        <p style="color:#666;font-weight:bold;margin-top:0;">Are you experiencing any of these?</p>
        <label class="chk-box"><input type="checkbox" id="c1" class="cb"> Thick white, clumpy discharge</label>
        <label class="chk-box"><input type="checkbox" id="c2" class="cb"> Severe itching or redness</label>
        <label class="chk-box"><input type="checkbox" id="c3" class="cb"> Fishy odor (especially after intimacy)</label>
        <label class="chk-box"><input type="checkbox" id="c4" class="cb"> Burning sensation when urinating</label>
        
        <button class="btn" onclick="check()">Analyze Symptoms 🦠</button>
        <div class="res" id="res"></div>
    </div>

    <script>
        function showM(txt){
            let m = document.getElementById('m-msg');
            m.innerText = txt; m.style.display="block";
            setTimeout(()=>m.style.display="none", 4000);
        }
        function check(){
            let c1 = document.getElementById('c1').checked;
            let c2 = document.getElementById('c2').checked;
            let c3 = document.getElementById('c3').checked;
            let c4 = document.getElementById('c4').checked;
            
            let res = document.getElementById('res');
            res.style.display="block";

            if (c1 && c2) {
                res.innerHTML = "Possible Yeast Infection. Very common. Over-the-counter anti-fungal creams usually work, but consult a doctor if it's your first time. 🧴";
                showM("यीस्ट इन्फेक्शन हो सकता है, डरने की बात नहीं! 🌸");
            } else if (c3) {
                res.innerHTML = "Possible Bacterial Vaginosis (BV). Requires prescription antibiotics. Please visit your gynecologist. 🩺";
                showM("एक बार डॉक्टर को दिखा लेना चाहिए! 🥺");
            } else if (c4) {
                res.innerHTML = "Possible UTI (Urinary Tract Infection). Drink plenty of water and consult a doctor for antibiotics. 💧";
                showM("पानी ज़्यादा पियो और डॉक्टर से बात करो! 💦");
            } else {
                res.innerHTML = "If you feel discomfort, it's always best to consult a professional. Don't use scented washes! 🚫";
                showM("खुशबूदार साबुन यूज़ मत करना! 🙅‍♀️");
            }
        }
        setTimeout(()=>showM("कुछ परेशानी लग रही है क्या? मुझे बताओ... 🥺"), 500);
    </script>
</body>
</html>
