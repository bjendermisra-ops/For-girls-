<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Diet Suggestion</title>
    <style>
        :root{--p:#4ADE80;--bg:#F0FEF6;--c:#fff;--t:#1A4D2E}
        body{background:var(--bg);font-family:'Nunito',sans-serif;margin:0;padding:20px 20px 100px;color:var(--t)}
        .blob{position:fixed;border-radius:50%;filter:blur(60px);z-index:-1;opacity:.5}
        .b1{width:200px;height:200px;background:var(--p);top:-50px;left:-50px;animation:f 8s infinite alternate}
        .b2{width:250px;height:250px;background:#86EFAC;bottom:100px;right:-50px;animation:f 10s infinite alternate-reverse}
        @keyframes f{to{transform:translateY(30px) scale(1.1)}}
        .nav{display:flex;align-items:center;gap:15px;margin-bottom:20px}
        .back{background:#fff;width:40px;height:40px;border-radius:50%;display:flex;justify-content:center;align-items:center;color:var(--p);text-decoration:none;font-size:24px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
        .card{background:var(--c);border-radius:25px;padding:25px;box-shadow:0 10px 25px rgba(74,222,128,.15);animation:slideUp .5s}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        select{width:100%;padding:15px;border:2px solid #eee;border-radius:15px;font-size:16px;outline:none;box-sizing:border-box;margin-bottom:15px;font-weight:bold;}
        .btn{width:100%;background:linear-gradient(135deg,var(--p),#86EFAC);color:#1A4D2E;border:none;padding:18px;border-radius:15px;font-size:16px;font-weight:bold;cursor:pointer;}
        .res{display:none;background:#F0FEF6;border:2px dashed var(--p);padding:20px;border-radius:20px;margin-top:20px;text-align:left;font-weight:bold;animation:pop .4s;line-height:1.6}
        .mascot{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;align-items:flex-end;z-index:100}
        .m-doll{font-size:45px;background:radial-gradient(circle,rgba(255,255,255,.8),transparent);border-radius:50%;width:60px;height:60px;display:flex;justify-content:center;align-items:center;animation:f 3s infinite alternate}
        .m-msg{background:#fff;padding:10px 15px;border-radius:15px 15px 0 15px;font-size:13px;font-weight:bold;color:var(--p);box-shadow:0 5px 15px rgba(0,0,0,.1);margin-bottom:5px;display:none;animation:pop .3s}
        @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    </style>
</head>
<body>
    <div class="blob b1"></div><div class="blob b2"></div>
    <div class="mascot">
        <div class="m-msg" id="m-msg"></div>
        <div class="m-doll" onclick="showM('AI तुम्हारा मेन्यू बना रहा है! 🥗')">🧚‍♀️</div>
    </div>
    
    <div class="nav">
        <a href="../tools.html" class="back">‹</a>
        <h2 style="margin:0">AI Diet Gen</h2>
    </div>

    <div class="card">
        <select id="pref">
            <option value="veg">Vegetarian 🥦</option>
            <option value="nonveg">Non-Vegetarian 🍗</option>
        </select>
        <button class="btn" id="gBtn" onclick="gen()">Generate Smart Meal 🤖</button>
        <div class="res" id="res"></div>
    </div>

    <script>
        function showM(txt){
            let m = document.getElementById('m-msg');
            m.innerText = txt; m.style.display="block";
            setTimeout(()=>m.style.display="none", 4000);
        }
        function gen(){
            let v = document.getElementById('pref').value;
            let btn = document.getElementById('gBtn');
            btn.innerText = "Generating AI Meal... ⏳";
            
            setTimeout(()=>{
                btn.innerText = "Generate Smart Meal 🤖";
                let res = document.getElementById('res');
                res.style.display="block";

                if(v==="veg") {
                    res.innerHTML = "<b>✨ AI Veg Plan:</b><br>• Breakfast: Oatmeal with pumpkin seeds & berries.<br>• Lunch: Spinach & Lentil soup (Iron boost).<br>• Snack: Dark chocolate & walnuts.<br>• Dinner: Grilled Paneer salad.";
                    showM("पनीर और डार्क चॉकलेट बहुत फायदेमंद है! 🥗");
                } else {
                    res.innerHTML = "<b>✨ AI Non-Veg Plan:</b><br>• Breakfast: 2 Boiled eggs & avocado toast.<br>• Lunch: Grilled chicken & quinoa.<br>• Snack: Greek yogurt with honey.<br>• Dinner: Baked salmon (Omega-3 boost).";
                    showM("ओमेगा-3 से स्किन भी ग्लो करेगी! 🐟");
                }
                if(navigator.vibrate) navigator.vibrate([30,50]);
            }, 1500);
        }
        setTimeout(()=>showM("चलो आज कुछ हेल्दी और टेस्टी खाते हैं! 🥑"), 500);
    </script>
</body>
</html>
