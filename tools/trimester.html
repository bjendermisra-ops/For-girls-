<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trimester Calculator</title>
    <style>
        :root{--p:#5AA1FF;--bg:#F1F8FE;--c:#fff;--t:#333}
        body{background:var(--bg);font-family:'Nunito',sans-serif;margin:0;padding:20px 20px 100px;color:var(--t)}
        .blob{position:fixed;border-radius:50%;filter:blur(60px);z-index:-1;opacity:.5}
        .b1{width:200px;height:200px;background:var(--p);top:-50px;left:-50px;animation:f 8s infinite alternate}
        .b2{width:250px;height:250px;background:#D6E8FF;bottom:100px;right:-50px;animation:f 10s infinite alternate-reverse}
        @keyframes f{to{transform:translateY(30px) scale(1.1)}}
        .nav{display:flex;align-items:center;gap:15px;margin-bottom:20px}
        .back{background:#fff;width:40px;height:40px;border-radius:50%;display:flex;justify-content:center;align-items:center;color:var(--p);text-decoration:none;font-size:24px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
        .card{background:var(--c);border-radius:25px;padding:25px;box-shadow:0 10px 25px rgba(90,161,255,.1);animation:slideUp .5s}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        label{font-weight:bold;color:#666;font-size:14px;display:block;margin:15px 0 5px}
        input{width:100%;padding:15px;border:2px solid #eee;border-radius:15px;font-size:16px;outline:none;box-sizing:border-box}
        input:focus{border-color:var(--p)}
        .btn{width:100%;background:linear-gradient(135deg,var(--p),#76CEFF);color:#fff;border:none;padding:18px;border-radius:15px;font-size:16px;font-weight:bold;margin-top:20px;cursor:pointer;box-shadow:0 5px 15px rgba(90,161,255,.3)}
        .res{display:none;background:#F1F8FE;border:2px dashed var(--p);padding:20px;border-radius:20px;margin-top:20px;text-align:center;font-weight:bold;animation:pop .4s}
        .mascot{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;align-items:flex-end;z-index:100}
        .m-doll{font-size:45px;background:radial-gradient(circle,rgba(255,255,255,.8),transparent);border-radius:50%;width:60px;height:60px;display:flex;justify-content:center;align-items:center;animation:f 3s infinite alternate}
        .m-msg{background:#fff;padding:10px 15px;border-radius:15px 15px 0 15px;font-size:13px;font-weight:bold;color:var(--p);box-shadow:0 5px 15px rgba(0,0,0,.1);margin-bottom:5px;display:none;animation:pop .3s}
        @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
        .tri-line{font-size:14px;color:#555;margin:8px 0;display:flex;justify-content:space-between}
    </style>
</head>
<body>
    <div class="blob b1"></div><div class="blob b2"></div>
    <div class="mascot">
        <div class="m-msg" id="m-msg"></div>
        <div class="m-doll" onclick="showM('हर ट्राइमेस्टर की अपनी खुशी है! 🌟')">👼</div>
    </div>
    
    <div class="nav">
        <a href="../tools.html" class="back">‹</a>
        <h2 style="margin:0">Trimester Plan</h2>
    </div>

    <div class="card">
        <label>First day of Last Period (LMP)</label>
        <input type="date" id="lmp">
        <button class="btn" onclick="calc()">Get Timeline 🍼</button>
        <div class="res" id="res"></div>
    </div>

    <script>
        function showM(txt){
            let m = document.getElementById('m-msg');
            m.innerText = txt; m.style.display="block";
            setTimeout(()=>m.style.display="none", 4000);
        }
        function calc(){
            let d = document.getElementById('lmp').value;
            if(!d) return showM("प्लीज़ LMP डेट सेलेक्ट करो! 🥰");
            
            let lmp = new Date(d);
            let t1 = new Date(lmp); t1.setDate(t1.getDate() + 90);  // End of T1
            let t2 = new Date(lmp); t2.setDate(t2.getDate() + 189); // End of T2
            let t3 = new Date(lmp); t3.setDate(t3.getDate() + 280); // EDD

            document.getElementById('res').style.display="block";
            document.getElementById('res').innerHTML = `
                <div class="tri-line"><span><b>1st Trimester</b> (W1-12)</span> <span style="color:#5AA1FF">${t1.toLocaleDateString()}</span></div>
                <div class="tri-line"><span><b>2nd Trimester</b> (W13-26)</span> <span style="color:#5AA1FF">${t2.toLocaleDateString()}</span></div>
                <div class="tri-line"><span><b>3rd Trimester</b> (W27-40)</span> <span style="color:#5AA1FF">${t3.toLocaleDateString()}</span></div>
            `;
            showM("यह रहा तुम्हारी प्रेगनेंसी का पूरा सफर! 🗺️💖");
        }
        setTimeout(()=>showM("चलो तुम्हारे माइलस्टोन्स चेक करें! 👶🏻"), 500);
    </script>
</body>
</html>
