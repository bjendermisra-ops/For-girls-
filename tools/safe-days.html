
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Safe Days Calculator</title>
    <style>
        :root{--p:#FF5A7A;--bg:#FEF1F6;--c:#fff;--t:#333}
        body{background:var(--bg);font-family:'Nunito',sans-serif;margin:0;padding:20px 20px 100px;color:var(--t)}
        .blob{position:fixed;border-radius:50%;filter:blur(60px);z-index:-1;opacity:.5}
        .b1{width:200px;height:200px;background:var(--p);top:-50px;left:-50px;animation:f 8s infinite alternate}
        .b2{width:250px;height:250px;background:#FFD1E3;bottom:100px;right:-50px;animation:f 10s infinite alternate-reverse}
        @keyframes f{to{transform:translateY(30px) scale(1.1)}}
        .nav{display:flex;align-items:center;gap:15px;margin-bottom:20px}
        .back{background:#fff;width:40px;height:40px;border-radius:50%;display:flex;justify-content:center;align-items:center;color:var(--p);text-decoration:none;font-size:24px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
        .card{background:var(--c);border-radius:25px;padding:25px;box-shadow:0 10px 25px rgba(255,90,122,.1);animation:slideUp .5s}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        label{font-weight:bold;color:#666;font-size:14px;display:block;margin:15px 0 5px}
        input{width:100%;padding:15px;border:2px solid #eee;border-radius:15px;font-size:16px;outline:none;box-sizing:border-box}
        input:focus{border-color:var(--p)}
        .btn{width:100%;background:linear-gradient(135deg,var(--p),#FF7696);color:#fff;border:none;padding:18px;border-radius:15px;font-size:16px;font-weight:bold;margin-top:20px;cursor:pointer;box-shadow:0 5px 15px rgba(255,90,122,.3)}
        .btn:active{transform:scale(.95)}
        .res{display:none;background:#F0FEF6;border:2px dashed #4ADE80;padding:20px;border-radius:20px;margin-top:20px;text-align:center;font-weight:bold;animation:pop .4s;color:#1A4D2E}
        .mascot{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;align-items:flex-end;z-index:100}
        .m-doll{font-size:45px;background:radial-gradient(circle,rgba(255,255,255,.8),transparent);border-radius:50%;width:60px;height:60px;display:flex;justify-content:center;align-items:center;animation:f 3s infinite alternate}
        .m-msg{background:#fff;padding:10px 15px;border-radius:15px 15px 0 15px;font-size:13px;font-weight:bold;color:var(--p);box-shadow:0 5px 15px rgba(0,0,0,.1);margin-bottom:5px;display:none;animation:pop .3s}
        @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    </style>
</head>
<body>
    <div class="blob b1"></div><div class="blob b2"></div>
    <div class="mascot">
        <div class="m-msg" id="m-msg"></div>
        <div class="m-doll" onclick="showM('फिर भी प्रोटेक्शन यूज़ करना हमेशा अच्छा होता है! 🛡️')">🧚‍♀️</div>
    </div>
    
    <div class="nav">
        <a href="../tools.html" class="back">‹</a>
        <h2 style="margin:0">Safe Days Checker</h2>
    </div>

    <div class="card">
        <label>Last Period Start Date</label>
        <input type="date" id="lmp">
        <label>Your Cycle Length</label>
        <input type="number" id="cl" value="28">
        <button class="btn" onclick="calc()">Calculate Safe Days 🛡️</button>
        <div class="res" id="res"></div>
    </div>

    <script>
        function showM(txt){
            let m = document.getElementById('m-msg');
            m.innerText = txt; m.style.display="block";
            setTimeout(()=>m.style.display="none", 4000);
        }
        function calc(){
            let d = document.getElementById('lmp').value;
            let c = parseInt(document.getElementById('cl').value);
            if(!d) return showM("डेटा मिसिंग है! 🥺");
            
            let lmpDate = new Date(d);
            let ov = new Date(d); ov.setDate(ov.getDate() + c - 14);
            let fs = new Date(ov); fs.setDate(ov.getDate() - 5);
            let fe = new Date(ov); fe.setDate(ov.getDate() + 1);
            let nextP = new Date(d); nextP.setDate(nextP.getDate() + c);

            let safe1End = new Date(fs); safe1End.setDate(safe1End.getDate() - 1);
            let safe2Start = new Date(fe); safe2Start.setDate(safe2Start.getDate() + 1);

            document.getElementById('res').style.display="block";
            document.getElementById('res').innerHTML = `
                Phase 1 (Post Period):<br><span style="color:#4ADE80">${lmpDate.toLocaleDateString()} to ${safe1End.toLocaleDateString()}</span><br><br>
                Phase 2 (Pre Period):<br><span style="color:#4ADE80">${safe2Start.toLocaleDateString()} to ${nextP.toLocaleDateString()}</span>
            `;
            showM("सुरक्षित दिन कैलकुलेट हो गए! ✅");
        }
        setTimeout(()=>showM("मैं बताउंगी कब प्रेगनेंसी के चांस सबसे कम हैं! 🌿"), 500);
    </script>
</body>
</html>
