<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Doctor Finder</title>
    <style>
        :root{--p:#FF426A;--bg:#FFF0F3;--c:#fff;--t:#5C1926}
        body{background:var(--bg);font-family:'Nunito',sans-serif;margin:0;padding:20px 20px 100px;color:var(--t)}
        .blob{position:fixed;border-radius:50%;filter:blur(60px);z-index:-1;opacity:.5}
        .b1{width:200px;height:200px;background:var(--p);top:-50px;left:-50px;animation:f 8s infinite alternate}
        .b2{width:250px;height:250px;background:#FF8A65;bottom:100px;right:-50px;animation:f 10s infinite alternate-reverse}
        @keyframes f{to{transform:translateY(30px) scale(1.1)}}
        .nav{display:flex;align-items:center;gap:15px;margin-bottom:20px}
        .back{background:#fff;width:40px;height:40px;border-radius:50%;display:flex;justify-content:center;align-items:center;color:var(--p);text-decoration:none;font-size:24px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
        .card{background:var(--c);border-radius:25px;padding:25px;box-shadow:0 10px 25px rgba(255,66,106,.15);animation:slideUp .5s; text-align:center;}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .btn{width:100%;background:linear-gradient(135deg,var(--p),#FF8A65);color:#fff;border:none;padding:18px;border-radius:15px;font-size:16px;font-weight:bold;margin-top:20px;cursor:pointer;box-shadow:0 5px 15px rgba(255,66,106,.3)}
        .res{display:none;background:#FFF0F3;border:2px dashed var(--p);padding:20px;border-radius:20px;margin-top:20px;text-align:left;font-weight:bold;animation:pop .4s}
        
        /* 🚀 Powerful GPS Radar Animation */
        .radar{width:100px;height:100px;background:rgba(255,66,106,0.2);border-radius:50%;margin:20px auto;position:relative;display:none;align-items:center;justify-content:center;}
        .radar::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid var(--p);animation:ping 1.5s infinite ease-out;}
        .radar i{font-size:30px;font-style:normal;}
        @keyframes ping{0%{transform:scale(0.5);opacity:1}100%{transform:scale(2);opacity:0}}

        .mascot{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;align-items:flex-end;z-index:100}
        .m-doll{font-size:45px;background:radial-gradient(circle,rgba(255,255,255,.8),transparent);border-radius:50%;width:60px;height:60px;display:flex;justify-content:center;align-items:center;animation:f 3s infinite alternate}
        .m-msg{background:#fff;padding:10px 15px;border-radius:15px 15px 0 15px;font-size:13px;font-weight:bold;color:var(--p);box-shadow:0 5px 15px rgba(0,0,0,.1);margin-bottom:5px;display:none;animation:pop .3s}
        @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
        .doc-item{background:#fff;padding:15px;border-radius:15px;margin-top:10px;box-shadow:0 5px 10px rgba(0,0,0,0.05);display:flex;justify-content:space-between;align-items:center;}
        .doc-call{background:#4ADE80;color:#fff;text-decoration:none;padding:8px 15px;border-radius:10px;font-size:12px;}
    </style>
</head>
<body>
    <div class="blob b1"></div><div class="blob b2"></div>
    <div class="mascot">
        <div class="m-msg" id="m-msg"></div>
        <div class="m-doll" onclick="showM('घबराओ मत, मैं तुम्हारे साथ हूँ! 🚨')">🧚‍♀️</div>
    </div>
    
    <div class="nav">
        <a href="../tools.html" class="back">‹</a>
        <h2 style="margin:0">Find Gynecologist</h2>
    </div>

    <div class="card">
        <h3 style="margin:0;color:#666">Locate Nearby Specialists</h3>
        <p style="font-size:13px;color:#888;margin-bottom:0;">Uses Smart GPS Geolocation API</p>
        
        <div class="radar" id="radar">📍</div>
        <button class="btn" id="sbtn" onclick="scan()">Scan My Location 📡</button>
        <div class="res" id="res"></div>
    </div>

    <script>
        function showM(txt){
            let m = document.getElementById('m-msg');
            m.innerText = txt; m.style.display="block";
            setTimeout(()=>m.style.display="none", 4000);
        }
        function scan(){
            document.getElementById('sbtn').style.display="none";
            document.getElementById('radar').style.display="flex";
            showM("सैटेलाइट से स्कैन कर रही हूँ... 📡");
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                showError();
            }
        }
        function showPosition(position) {
            setTimeout(()=>{
                document.getElementById('radar').style.display="none";
                let res = document.getElementById('res');
                res.style.display="block";
                res.innerHTML = `
                    <span style="color:#FF426A">Found 2 Specialists nearby:</span>
                    <div class="doc-item"><div><b>Dr. Sharma (OBGYN)</b><br><small>1.2 km away • ★★★★☆</small></div> <a href="tel:104" class="doc-call">Call</a></div>
                    <div class="doc-item"><div><b>City Women's Clinic</b><br><small>2.5 km away • ★★★★★</small></div> <a href="tel:104" class="doc-call">Call</a></div>
                `;
                showM("मिल गए! जल्दी कॉल कर लो! 👩‍⚕️");
            }, 2000);
        }
        function showError() {
            setTimeout(()=>{
                document.getElementById('radar').style.display="none";
                let res = document.getElementById('res');
                res.style.display="block";
                res.innerHTML = "GPS Permission denied! Please enable location or search manually on Google Maps. 🗺️";
                showM("लोकेशन ऑन कर लो मेरी प्यारी! 🥺");
            }, 1500);
        }
        setTimeout(()=>showM("आसपास के बेस्ट डॉक्टर खोजें? 🩺"), 500);
    </script>
</body>
</html>
