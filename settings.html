<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Center</title>
    <!-- Embedding Style base explicitly identical to dashboard -->
    <style>
         :root {--primary-color: #FF5A7A; --bg: #FEF1F6;} body.preg-mode{--primary-color: #5AA1FF; --bg:#F1F8FE;} *{box-sizing: border-box;}
         body { margin:0; padding:20px 0 95px 0; background:var(--bg); font-family:'SF Pro Display', sans-serif;}
         .crd {background:#fff; margin:0 20px 20px; padding:22px; border-radius:30px; box-shadow:0 10px 30px rgba(0,0,0,0.06); position:relative;}
         select { width:100%; padding:15px; border-radius:15px; background:#F5F6FA; border:1px solid #ddd; outline:none; font-size:15px; font-weight:700;}
         label { font-size: 14px; color: #555; display:block; margin-bottom: 5px; font-weight: 700; }
         h2 {text-align:center; color:#222; margin:10px;}
         .navv { position:fixed; bottom:0; left:0; width:100%; height:80px; display:flex; justify-content:space-evenly; align-items:center; background:#fff; z-index:9; border-top-right-radius:20px; border-top-left-radius:20px;}
         .icnn svg{ width:28px; height:28px; stroke:#aaa; fill:none; stroke-width:2;} .act svg{ stroke:var(--primary-color);}
         .switch-line {display:flex; justify-content:space-between; align-items:center; margin-top:20px; margin-bottom:5px; border-top:1px dashed #ddd; padding-top:20px;}
         .tgld input { display:none;} .slider { width:46px; height:26px; border-radius:26px; background:#ddd; position:relative; transition:0.3s; cursor:pointer;} .slider:before{content:"";position:absolute; width:18px;height:18px;border-radius:50%; background:#fff; top:4px;left:4px; transition:0.4s;} .tgld input:checked + .slider {background: #1CC489;} .tgld input:checked + .slider:before{transform:translateX(20px);} 
         
         .btnx {width:100%; background:linear-gradient(to right, #FF5A7A, #FF7696); padding:16px; border-radius:20px; color:white; font-size:16px; font-weight:700; border:none; transition:0.3s;} body.preg-mode .btnx {background: linear-gradient(to right, #5AA1FF, #76CEFF);}
         .warnn {border:1px solid #FFA3A3;} .dangerB {background:#FFF3F3; color:red; }

         /* High End Action Screen Overlays! (You demanded Pop-Up!)*/
         .act-pop { position:fixed; z-index:99999; top:0; left:0; right:0; bottom:0; display:none; flex-direction:column; justify-content:center; align-items:center; background:rgba(0,0,0,0.7); animation:inop 0.4s; }
         .act-card { background:#fff; width:300px; padding:30px; text-align:center; border-radius:35px; transform:scale(0.8); transition:0.3s cubic-bezier(0.3,1,0.3,1);} .act-pop.op {display:flex;} .act-pop.op .act-card{transform:scale(1);}
         .ckm { width:70px; height:70px; background:#1CC489; border-radius:50%; margin: 0 auto 20px; display:flex; align-items:center; justify-content:center; }
         .ckm svg {width:40px; height:40px; fill:none; stroke:#fff; stroke-width:4; stroke-linecap:round;}
         @keyframes inop {from{opacity:0;}to{opacity:1;}}
    </style>
</head>
<body>
    <div id="fullLoader"><h2 id="lTextH1" data-hi="माय कंट्रोल्स ⚙️" data-en="Setup Core ⚙️">Cont...</h2></div>
    
    <div class="crd">
         <label data-en="Your Application UI Lang" data-hi="सिस्टम ऐप भाषा"></label>
         <select id="uxLangPref" onchange="runTranslateAppLine(this.value)">
             <option value="en">English (USA) 😎</option>
             <option value="hi">शुद्ध हिंदी (मदरटंग) 🌸</option>
         </select>
    </div>

    <!-- Alert Frequency Power Upgrade without deleting single line -->
    <div class="crd" style="box-shadow:0 0 0 3px rgba(28,196,137,0.1)">
         <label style="color:#1CC489;" data-hi="स्मार्ट रिमाइंडर सिस्टम ✅" data-en="Notification Alarms Engine ✅"></label>
         
         <div class="switch-line" style="margin-top:5px; padding-top:10px; border:none;">
            <span style="font-weight:bold; font-size:15px;" data-en="Keep Reminders Alert ON" data-hi="मेरे रिमाइंडर हमेशा चालू रखें">Turn On</span>
            <label class="tgld"><input type="checkbox" id="toglPushSet"><div class="slider"></div></label>
         </div>

         <label style="margin-top:10px;" data-hi="नोटिफाई अलर्ट कितनी बार आयें? (Frequency)" data-en="Daily Interval Density Level"></label>
         <select id="tAlertMode" style="border:1px solid #1CC489;">
             <option value="1">एक दिन पहले, रोज एक बार 🔔</option>
             <option value="2">2 दिन पहले ही सतर्क कर दे!</option>
             <option value="1_CUSTOM_2H">Custom : दिन पहले (लेकिन हर 2 घंटे बजे!)⏰</option>
             <option value="1_CUSTOM_5H">SuperCustom: 5 घंटे अंतराल में!</option>
             <option value="5">अति सतर्क : 5 दिन पहले ही बता दे।</option>
         </select>
         
         <button class="btnx" onclick="invokeSystemCommitPush()" style="margin-top:15px; display:flex; gap:10px; justify-content:center;"><svg width="24" height="24" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> <span data-en="Save Advanced Native Alert Configuration!" data-hi="मोबाइल नोटिफिकेशन सिस्टम चालू करे!"></span></button>

         <p style="margin-top: 25px; border-bottom:1px solid #ddd; padding-bottom:10px;" data-hi="डेमो: आपके नाम के साथ पुश जायेगा। (Test Mocking Name)" data-en="Push will pass dynamic Realname mock tests."></p>
         
         <button onclick="pingHardPush()" class="btnx" style="background:#4A90E2; color:#fff;" data-en="Mock / Trigger Dev Alarm test📱" data-hi="सिस्टम देव: घंटी का परीक्षण करें!📱"></button>
    </div>

    <div class="crd">
         <div class="switch-line" style="margin-top:0; padding:0; border:none; margin-bottom:15px;">
             <div><span style="font-weight:bold;" data-hi="👼 प्रेग्नेंसी मोड! (वीक ट्रैक करें)" data-en="👼 Mom Pregnancy Route On">M</span>
                  <div style="font-size:10px; color:#5AA1FF;" data-en="Changes UI globally instantly.">BETA FUTURE FOUNDATION..</div>
             </div>
             <label class="tgld"><input type="checkbox" id="mDSwitchPg" onchange="runSaveFutureSys(this.checked)"><div class="slider"></div></label>
         </div>
    </div>

    <!-- The Success Animated Flash POP UI Request Check! -->
    <div class="act-pop" id="actMdck">
        <div class="act-card">
            <div class="ckm"><svg viewBox="0 0 24 24"><path d="M2 13l7 7 13-13"/></svg></div>
            <h3 id="aTxkNm">Successfully Set</h3>
            <p style="font-weight:600; font-size:14px; color:#555;" id="aTxkBm">Set Hogaya hai...</p>
        </div>
    </div>


    <div class="navv">
         <a onclick="location.href='index.html'" class="icnn"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></a>
         <a onclick="location.href='settings.html'" class="icnn act"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
    </div>

    <script>
        const amData = JSON.parse(localStorage.getItem('userData'));
        let configBase = JSON.parse(localStorage.getItem('appConfig')) || { lang: 'hi', pregMode:false };
        
        function bootOps() {
             document.getElementById('uxLangPref').value = configBase.lang;
             if(configBase.pregMode) { document.getElementById('mDSwitchPg').checked = true; document.body.classList.add('preg-mode');}
             document.getElementById('toglPushSet').checked = localStorage.getItem('masterToglStatus') !== "NO"; 
             document.getElementById('tAlertMode').value = localStorage.getItem('lastFreqKey') || "1";
             transTxt();
        }
        function runTranslateAppLine(valX){ configBase.lang=valX; localStorage.setItem('appConfig', JSON.stringify(configBase)); location.reload();}
        function runSaveFutureSys(vx) { configBase.pregMode=vx; localStorage.setItem('appConfig', JSON.stringify(configBase)); location.reload(); }
        function transTxt(){ document.querySelectorAll('[data-'+configBase.lang+']').forEach(a=>{ a.innerText = a.getAttribute('data-'+configBase.lang);}); }

        // Android API Legacy Compatible String Bridge System with advanced param! 
        function invokeSystemCommitPush() {
             if(!amData){ alert("Bhai pahle regstr krow yr pgl!"); location.href="index.html"; return; }
             let isOkeyStatus = document.getElementById('toglPushSet').checked; 
             let remIdexLox = document.getElementById('tAlertMode').value; // captures frequency + string securely! 

             localStorage.setItem('masterToglStatus', isOkeyStatus ? "YES" : "NO");
             localStorage.setItem('lastFreqKey', remIdexLox); 

             // Native Call Uncompromised exactly legacy rules - pass Custom args smartly ! 
             try{ 
                  if(window.Android && window.Android.scheduleNotification){
                        if(isOkeyStatus) window.Android.scheduleNotification(amData.lastDate, amData.cycleLength, remIdexLox);
                        else window.Android.scheduleNotification(amData.lastDate, amData.cycleLength, "OFF");
                  }
             } catch(xcp){}

             // User Visual Delight POP System Requested -> Setup Complete
             const nmA=(amData.name||"Bhai");
             document.getElementById('aTxkNm').innerText = isOkeyStatus ? `Super Set! 👑` : `Alert OFF`;
             let cxXn = isOkeyStatus?`तैयार रहें ${nmA}! पॉप-अप, अलर्टस ${remIdexLox.includes('CUSTOM')?'बहुत बार और खास (Heavy custom setup)':'सही टाइम'} पर बज जाएंगे!`:`Relax Mode (बंद) ✔`;
             if(configBase.lang=='en') cxXn = isOkeyStatus ?`Perfectly Locked. We'll alert ${nmA} dynamically using string param[${remIdexLox}].`: 'Notifications securely off';

             document.getElementById('aTxkBm').innerText = cxXn;
             document.getElementById('actMdck').classList.add('op'); 
             setTimeout(()=> { document.getElementById('actMdck').classList.remove('op');}, 3500);
        }

        // Test push system passing Exact App USER NAME down natively safely
        function pingHardPush() {
             if(!amData) return;
             try{
                 // Passing explicit User Name directly! Mock alert!
                 if(window.Android && window.Android.testNotificationNow){
                      try{ window.Android.testNotificationNow(amData.name, "Testing custom hook user bind.");} catch(ec){window.Android.testNotificationNow();} // dual check 
                 }
             }catch(dce){}

             // Flashy UI verification since no Backend is available
             document.getElementById('aTxkNm').innerText = "Pushing Test 🔥";
             document.getElementById('aTxkBm').innerText = configBase.lang=='hi'?`${amData.name} को कॉल भेजा जा रहा है!`:`Direct User: ${amData.name} tested...`;
             document.getElementById('actMdck').classList.add('op'); 
             setTimeout(()=>document.getElementById('actMdck').classList.remove('op'), 2500);
        }

        document.addEventListener('DOMContentLoaded', bootOps);
    </script>
</body>
</html>
