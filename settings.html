<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast">Setup Check</div>

    <div class="page-title">ऐप सेटिंग्स / कंट्रोल ⚙️</div>
    
    <div class="card">
        <div class="toggle-switch">
            <span style="font-weight:700; font-size:16px;">सुरक्षित अलर्टस् (Safe Push)</span>
            <label>
                <input type="checkbox" id="optSwBtn" onchange="hitConfigSaver()">
                <div class="slider-btn"></div>
            </label>
        </div>
        
        <p style="font-size:12px; color:var(--text-muted); margin:-5px 0 15px;">असुविधा न हो इसलिए हम नोटिफिकेशन सुरक्षित तरीके से आपके नाम से ही देंगे!</p>

        <label>पीरियड से कितने दिन पहले चेतावनी दें?</label>
        <select id="optSlcDys" onchange="hitConfigSaver()" style="margin-bottom:15px">
            <option value="1">1 दिन पहले (Most Default)</option>
            <option value="2">2 दिन पहले तैयार हो जाएँ</option>
            <option value="3">3 दिन पहले</option>
            <option value="5">5 दिन पहले अलर्ट दें</option>
        </select>
        
        <button class="btn btn-outline" style="background:#E6FAFF; border-color:transparent; color:#00BBEA" onclick="pingNativeS()">15 Sec. टेस्ट पुश भेजकर देखें (Trial System Push)</button>
    </div>

    <div class="card" style="border:1px solid #FFCDCD;">
        <p style="font-size:14px; margin-bottom:10px;"><b>एक्स्ट्रा टूल्स / सिस्टम एक्सेस:</b> <br><br> अगर कोई समस्या आती है तो डाटा साफ़ करें.</p>
        <a href="tools.html"><button class="btn" style="background:var(--success); margin-bottom:15px; box-shadow:none;">Calculator & Predictors Tool</button></a>

        <button class="btn btn-outline" style="border-color:#ffaaaa; color:var(--danger);" onclick="eraseMe()">🗑️ Reset Track Identity Account Data</button>
    </div>

    <!-- Complete System Nav! -->
    <div class="bottom-nav" id="mainBar">
        <a href="index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span class="nav-label">होम</span></a>

        <a href="symptoms.html" class="nav-item fab" style="color:white;"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></a>
