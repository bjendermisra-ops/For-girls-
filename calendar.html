<body>
    <div id="toast">Msg</div>

    <div class="page-title">कैलेंडर डायरी 🗓️</div>
    
    <div class="card" style="padding-bottom: 30px;">
        <div class="month-controls">
            <button class="m-btn" onclick="shftCal(-1)">❮</button>
            <div class="month-label" id="calTitleObj">Month 2026</div>
            <button class="m-btn" onclick="shftCal(1)">❯</button>
        </div>
        
        <div class="c-grid" id="calSpaceBox">
            <!-- Will render securely by master APP.JS boot function -->
        </div>
    </div>
    
    <div class="phase-card">
        <b>💡 फेज़ हिंट:</b> आपके शरीर का सिस्टम अभी जिस स्थिति में है, इसे साइंटिफिक कैलेंडर के जरिये ऊपर दिखाया गया है। नीला मतलब फर्टिलिटी, और गहरा गुलाबी मतलब पीरियड्स है।
    </div>
